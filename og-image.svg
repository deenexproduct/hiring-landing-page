<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5423E7"/>
      <stop offset="40%" style="stop-color:#3a15b0"/>
      <stop offset="100%" style="stop-color:#2a0f8a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
    <circle cx="16" cy="16" r="1" fill="white" opacity="0.06"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Content -->
  <!-- Badge -->
  <rect x="80" y="160" width="180" height="36" rx="18" fill="white" opacity="0.12"/>
  <circle cx="100" cy="178" r="5" fill="#4ade80"/>
  <text x="115" y="183" font-family="monospace" font-size="12" fill="white" opacity="0.8" letter-spacing="2">POSICI&#xD3;N ABIERTA</text>

  <!-- Founding label -->
  <text x="80" y="240" font-family="sans-serif" font-size="16" fill="white" opacity="0.5" letter-spacing="6">FOUNDING</text>

  <!-- Title -->
  <text x="80" y="310" font-family="sans-serif" font-size="72" font-weight="800" fill="white">Head of</text>
  <text x="430" y="310" font-family="sans-serif" font-size="72" font-weight="500" font-style="italic" fill="#c4b5fd">Marketing</text>

  <!-- Subtitle -->
  <text x="80" y="370" font-family="sans-serif" font-size="20" fill="white" opacity="0.6">Construí el área de marketing desde cero en la plataforma</text>
  <text x="80" y="400" font-family="sans-serif" font-size="20" fill="white" opacity="0.6">que está redefiniendo el canal online propio en LATAM.</text>

  <!-- Metrics bar -->
  <text x="80" y="480" font-family="sans-serif" font-size="28" font-weight="800" fill="white">Founding</text>
  <text x="260" y="480" font-family="sans-serif" font-size="14" fill="white" opacity="0.4">Rol de construcción</text>

  <text x="460" y="480" font-family="sans-serif" font-size="28" font-weight="800" fill="white">+ Equity</text>
  <text x="620" y="480" font-family="sans-serif" font-size="14" fill="white" opacity="0.4">0.5% – 2.5%</text>

  <text x="780" y="480" font-family="sans-serif" font-size="28" font-weight="800" fill="white">LATAM</text>
  <text x="920" y="480" font-family="sans-serif" font-size="14" fill="white" opacity="0.4">AR → BR → MX</text>

  <!-- Deenex logo text -->
  <text x="80" y="570" font-family="sans-serif" font-size="24" font-weight="700" fill="white" opacity="0.3">DEENEX</text>

  <!-- Bottom accent line -->
  <rect x="0" y="620" width="1200" height="10" fill="#F0EDFF" opacity="0.3"/>
</svg>
